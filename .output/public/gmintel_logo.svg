<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Sleek dark background -->
  <rect width="512" height="512" rx="96" fill="#141312"/>
  
  <!-- Subtle ambient inner glow -->
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff983d" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#141312" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="96" fill="url(#bgGlow)"/>

  <!-- Glowing Orange Fiber Weave Logo Structure -->
  <g transform="translate(256, 230)" stroke-linecap="round">
    <!-- Outer glowing layer -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g filter="url(#glow)">
      <!-- Weave curves with the exact warm orange colour #ff983d -->
      <!-- Vertical-ish curved fibers -->
      <path d="M -60 -100 C -20 -100, -40 100, 0 100" fill="none" stroke="#ff983d" stroke-width="12" opacity="0.85"/>
      <path d="M -20 -100 C 20 -100, 0 100, 40 100" fill="none" stroke="#ff983d" stroke-width="12" opacity="0.95"/>
      <path d="M 20 -100 C 60 -100, 40 100, 80 100" fill="none" stroke="#ff983d" stroke-width="12" opacity="0.85"/>
      
      <!-- Horizontal-ish curved intersecting fibers -->
      <path d="M -100 -60 C -100 -20, 100 -40, 100 0" fill="none" stroke="#ff983d" stroke-width="12" opacity="0.85"/>
      <path d="M -100 -20 C -100 20, 100 0, 100 40" fill="none" stroke="#ff983d" stroke-width="12" opacity="0.95"/>
      <path d="M -100 20 C -100 60, 100 40, 100 80" fill="none" stroke="#ff983d" stroke-width="12" opacity="0.85"/>

      <!-- Central high-tech interconnected nodes -->
      <circle cx="-32" cy="-45" r="7" fill="#ffffff"/>
      <circle cx="8" cy="-22" r="7" fill="#ffffff"/>
      <circle cx="48" cy="3" r="7" fill="#ffffff"/>
      <circle cx="-15" cy="20" r="7" fill="#ffffff"/>
      <circle cx="22" cy="42" r="7" fill="#ffffff"/>
    </g>
  </g>

  <!-- Modern clean typography -->
  <text x="256" y="415" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="800" font-size="44" fill="#ffffff" text-anchor="middle" letter-spacing="4">
    GM<tspan fill="#ff983d">INTEL</tspan>
  </text>
  
  <text x="256" y="450" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="14" fill="#888582" text-anchor="middle" letter-spacing="6">
    AI PLATFORM
  </text>
</svg>
